                                 openapi: 3.0.3
info:
  title: API Dígito Único
  description: |
    API REST para cálculo de dígito único com funcionalidades avançadas:

    ## Funcionalidades Principais
    - ✨ **Cálculo de Dígito Único**: Algoritmo otimizado para calcular o dígito único
    - 👥 **Gestão de Usuários**: CRUD completo de usuários
    - 🔒 **Criptografia RSA**: Suporte para chaves públicas RSA
    - 🚀 **Cache Inteligente**: Sistema de cache para otimizar cálculos
    - 📊 **Histórico**: Armazenamento de todos os cálculos realizados

    ## Algoritmo
    O algoritmo concatena um número `n` exatamente `k` vezes e calcula o dígito único:
    1. Concatena: "123" + k=3 → "123123123"
    2. Soma dígitos: 1+2+3+1+2+3+1+2+3 = 18
    3. Repete até obter um dígito: 1+8 = 9

    ## Autenticação
    Esta API não requer autenticação para fins de demonstração.

  version: 1.0.0
  contact:
    name: Equipe de Desenvolvimento
    email: dev@inter.com.br
  license:
    name: MIT License
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080
    description: Servidor de Desenvolvimento
  - url: https://api.digitounico.com
    description: Servidor de Produção

tags:
  - name: Usuários
    description: Operações de CRUD para usuários
  - name: Cálculos
    description: Operações de cálculo de dígito único
  - name: Criptografia
    description: Operações relacionadas à criptografia RSA

paths:
  /api/usuarios:
    get:
      tags:
        - Usuários
      summary: Listar todos os usuários
      description: Retorna uma lista paginada de todos os usuários cadastrados no sistema
      operationId: listarUsuarios
      parameters:
        - name: page
          in: query
          description: Número da página (começando em 0)
          required: false
          schema:
            type: integer
            default: 0
            minimum: 0
        - name: size
          in: query
          description: Tamanho da página
          required: false
          schema:
            type: integer
            default: 20
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Lista de usuários retornada com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Usuario'
              example:
                - id: 1
                  nome: "João Silva"
                  email: "joao@example.com"
                  dataCriacao: "2024-01-15T10:30:00Z"
                  chavePublicaRsa: "-----BEGIN PUBLIC KEY-----\n..."
                - id: 2
                  nome: "Maria Santos"
                  email: "maria@example.com"
                  dataCriacao: "2024-01-16T14:20:00Z"
                  chavePublicaRsa: null
        '500':
          description: Erro interno do servidor
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    post:
      tags:
        - Usuários
      summary: Criar novo usuário
      description: Cria um novo usuário no sistema
      operationId: criarUsuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioRequest'
            example:
              nome: "João Silva"
              email: "joao@example.com"
      responses:
        '201':
          description: Usuário criado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
              example:
                id: 1
                nome: "João Silva"
                email: "joao@example.com"
                dataCriacao: "2024-01-15T10:30:00Z"
                chavePublicaRsa: null
        '400':
          description: Dados de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                message: "Dados de entrada inválidos"
                errors:
                  - field: "email"
                    message: "Email deve ter formato válido"
                  - field: "nome"
                    message: "Nome é obrigatório"

  /api/usuarios/{id}:
    get:
      tags:
        - Usuários
      summary: Buscar usuário por ID
      description: Retorna os dados de um usuário específico
      operationId: buscarUsuarioPorId
      parameters:
        - name: id
          in: path
          required: true
          description: ID único do usuário
          schema:
            type: integer
            format: int64
            minimum: 1
      responses:
        '200':
          description: Usuário encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '404':
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
              example:
                message: "Usuário não encontrado"
                timestamp: "2024-01-15T10:30:00Z"

    put:
      tags:
        - Usuários
      summary: Atualizar usuário
      description: Atualiza os dados de um usuário existente
      operationId: atualizarUsuario
      parameters:
        - name: id
          in: path
          required: true
          description: ID único do usuário
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UsuarioRequest'
      responses:
        '200':
          description: Usuário atualizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'
        '400':
          description: Dados de entrada inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
        '404':
          description: Usuário não encontrado

    delete:
      tags:
        - Usuários
      summary: Deletar usuário
      description: Remove um usuário do sistema permanentemente
      operationId: deletarUsuario
      parameters:
        - name: id
          in: path
          required: true
          description: ID único do usuário
          schema:
            type: integer
            format: int64
      responses:
        '204':
          description: Usuário deletado com sucesso
        '404':
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/usuarios/chave-publica:
    post:
      tags:
        - Criptografia
      summary: Enviar chave pública RSA
      description: |
        Envia e armazena a chave pública RSA de um usuário para operações de criptografia.
        A chave deve estar no formato PEM padrão.
      operationId: enviarChavePublica
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ChavePublicaRequest'
            example:
              usuarioId: 1
              chavePublica: |
                -----BEGIN PUBLIC KEY-----
                MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA1234567890abcdefghij
                klmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ1234567890abcdefghij
                -----END PUBLIC KEY-----
      responses:
        '200':
          description: Chave pública armazenada com sucesso
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Chave pública armazenada com sucesso"
        '400':
          description: Chave pública inválida ou usuário não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/calculos/digito-unico:
    post:
      tags:
        - Cálculos
      summary: Calcular dígito único
      description: |
        Calcula o dígito único de um número concatenado k vezes.

        **Algoritmo:**
        1. Concatena o número `n` exatamente `k` vezes
        2. Soma todos os dígitos do número resultante
        3. Se o resultado tiver mais de um dígito, repete o processo
        4. Retorna o dígito único final (1-9)

        **Exemplo:**
        - n="123", k=2 → "123123"
        - Soma: 1+2+3+1+2+3 = 12
        - Soma: 1+2 = 3 (resultado final)
      operationId: calcularDigitoUnico
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CalculoRequest'
            examples:
              exemplo_simples:
                summary: Exemplo simples
                value:
                  n: "123"
                  k: 2
                  usuarioId: 1
              exemplo_complexo:
                summary: Exemplo complexo
                value:
                  n: "9875"
                  k: 4
                  usuarioId: 1
      responses:
        '200':
          description: Cálculo realizado com sucesso
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CalculoResponse'
              examples:
                sucesso:
                  summary: Resposta de sucesso
                  value:
                    resultado: 8
                    n: "9875"
                    k: 4
                    usuarioId: 1
                    timestamp: "2024-01-15T10:30:00Z"
                    fromCache: false
        '400':
          description: Parâmetros inválidos
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ValidationErrorResponse'
              example:
                message: "Parâmetros inválidos"
                errors:
                  - field: "n"
                    message: "Deve conter apenas dígitos"
                  - field: "k"
                    message: "Deve ser maior que 0"

  /api/calculos/usuario/{usuarioId}:
    get:
      tags:
        - Cálculos
      summary: Buscar cálculos de um usuário
      description: Retorna o histórico de todos os cálculos realizados por um usuário específico
      operationId: buscarCalculosUsuario
      parameters:
        - name: usuarioId
          in: path
          required: true
          description: ID único do usuário
          schema:
            type: integer
            format: int64
        - name: limit
          in: query
          description: Número máximo de resultados
          required: false
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 100
      responses:
        '200':
          description: Histórico de cálculos retornado com sucesso
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Resultado'
              example:
                - id: 1
                  n: "123"
                  k: 2
                  resultado: 3
                  usuarioId: 1
                  timestamp: "2024-01-15T10:30:00Z"
                - id: 2
                  n: "9875"
                  k: 4
                  resultado: 8
                  usuarioId: 1
                  timestamp: "2024-01-15T10:35:00Z"
        '404':
          description: Usuário não encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  schemas:
    Usuario:
      type: object
      required:
        - id
        - nome
        - email
        - dataCriacao
      properties:
        id:
          type: integer
          format: int64
          description: Identificador único do usuário
          example: 1
        nome:
          type: string
          description: Nome completo do usuário
          minLength: 2
          maxLength: 100
          example: "João Silva"
        email:
          type: string
          format: email
          description: Email único do usuário
          example: "joao@example.com"
        dataCriacao:
          type: string
          format: date-time
          description: Data e hora de criação do usuário
          example: "2024-01-15T10:30:00Z"
        chavePublicaRsa:
          type: string
          nullable: true
          description: Chave pública RSA do usuário em formato PEM
          example: "-----BEGIN PUBLIC KEY-----\nMIIBIjANBgkqhkiG9w0B..."

    UsuarioRequest:
      type: object
      required:
        - nome
        - email
      properties:
        nome:
          type: string
          description: Nome completo do usuário
          minLength: 2
          maxLength: 100
          example: "João Silva"
        email:
          type: string
          format: email
          description: Email único do usuário
          example: "joao@example.com"

    ChavePublicaRequest:
      type: object
      required:
        - usuarioId
        - chavePublica
      properties:
        usuarioId:
          type: integer
          format: int64
          description: ID do usuário proprietário da chave
          minimum: 1
          example: 1
        chavePublica:
          type: string
          description: Chave pública RSA em formato PEM
          pattern: '^-----BEGIN PUBLIC KEY-----.*-----END PUBLIC KEY-----$'
          example: |
            -----BEGIN PUBLIC KEY-----
            MIIBIjANBgkqhkiG9w0BAQEFAAOCAQ8AMIIBCgKCAQEA1234567890abcdefghij
            -----END PUBLIC KEY-----

    CalculoRequest:
      type: object
      required:
        - n
        - k
        - usuarioId
      properties:
        n:
          type: string
          description: Número para concatenação (apenas dígitos)
          pattern: '^[0-9]+$'
          minLength: 1
          maxLength: 1000000
          example: "9875"
        k:
          type: integer
          description: Número de concatenações
          minimum: 1
          maximum: 1000000
          example: 4
        usuarioId:
          type: integer
          format: int64
          description: ID do usuário que realiza o cálculo
          minimum: 1
          example: 1

    CalculoResponse:
      type: object
      required:
        - resultado
        - n
        - k
        - usuarioId
        - timestamp
        - fromCache
      properties:
        resultado:
          type: integer
          description: Dígito único calculado (1-9)
          minimum: 1
          maximum: 9
          example: 8
        n:
          type: string
          description: Número original usado no cálculo
          example: "9875"
        k:
          type: integer
          description: Número de concatenações realizadas
          example: 4
        usuarioId:
          type: integer
          format: int64
          description: ID do usuário que realizou o cálculo
          example: 1
        timestamp:
          type: string
          format: date-time
          description: Data e hora do cálculo
          example: "2024-01-15T10:30:00Z"
        fromCache:
          type: boolean
          description: Indica se o resultado foi obtido do cache
          example: false

    Resultado:
      type: object
      required:
        - id
        - n
        - k
        - resultado
        - usuarioId
        - timestamp
      properties:
        id:
          type: integer
          format: int64
          description: Identificador único do cálculo
          example: 1
        n:
          type: string
          description: Número usado no cálculo
          example: "9875"
        k:
          type: integer
          description: Número de concatenações
          example: 4
        resultado:
          type: integer
          description: Dígito único calculado
          minimum: 1
          maximum: 9
          example: 8
        usuarioId:
          type: integer
          format: int64
          description: ID do usuário proprietário do cálculo
          example: 1
        timestamp:
          type: string
          format: date-time
          description: Data e hora do cálculo
          example: "2024-01-15T10:30:00Z"

    ErrorResponse:
      type: object
      required:
        - message
        - timestamp
      properties:
        message:
          type: string
          description: Mensagem de erro
          example: "Recurso não encontrado"
        timestamp:
          type: string
          format: date-time
          description: Data e hora do erro
          example: "2024-01-15T10:30:00Z"
        details:
          type: string
          description: Detalhes adicionais do erro
          example: "Usuário com ID 999 não foi encontrado"

    ValidationErrorResponse:
      type: object
      required:
        - message
        - timestamp
        - errors
      properties:
        message:
          type: string
          description: Mensagem geral de erro de validação
          example: "Dados de entrada inválidos"
        timestamp:
          type: string
          format: date-time
          description: Data e hora do erro
          example: "2024-01-15T10:30:00Z"
        errors:
          type: array
          description: Lista detalhada de erros de validação
          items:
            type: object
            properties:
              field:
                type: string
                description: Campo que causou o erro
                example: "email"
              message:
                type: string
                description: Mensagem específica do erro
                example: "Email deve ter formato válido"

  examples:
    UsuarioExemplo:
      summary: Exemplo de usuário
      value:
        nome: "João Silva"
        email: "joao@example.com"

    CalculoExemplo:
      summary: Exemplo de cálculo
      value:
        n: "9875"
        k: 4
        usuarioId: 1

  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        Autenticação via token JWT (não implementada nesta versão de demonstração)

security: []

externalDocs:
  description: Documentação adicional no GitHub
  url: https://github.com/exemplo/digito-unico-api
